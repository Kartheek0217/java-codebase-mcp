databaseChangeLog:
  - changeSet:
      id: 001-init
      author: mcp
      changes:
        - createTable:
            tableName: repositories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: root_path
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: files
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: repository_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: path
                  type: VARCHAR(2048)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: last_modified_epoch_ms
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: content_sha256
                  type: VARCHAR(64)
              - column:
                  name: language
                  type: VARCHAR(64)
              - column:
                  name: indexed_at
                  type: TIMESTAMP

        - addUniqueConstraint:
            tableName: files
            columnNames: repository_id, path
            constraintName: uq_files_repo_path

        - addForeignKeyConstraint:
            baseTableName: files
            baseColumnNames: repository_id
            referencedTableName: repositories
            referencedColumnNames: id
            constraintName: fk_files_repository

