<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Codebase MCP Dashboard</title>
    <meta name="description" content="A powerful UI for managing and searching your Java codebase using MCP.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">📂</span>
                <h1>Codebase MCP</h1>
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" data-tab="dashboard">
                    <span class="icon">📊</span> Dashboard
                </button>
                <button class="nav-item" data-tab="search">
                    <span class="icon">🔍</span> Global Search
                </button>
                <button class="nav-item" data-tab="browser">
                    <span class="icon">🌐</span> Headless Browser
                </button>
                <button class="nav-item" data-tab="agent">
                    <span class="icon">🤖</span> AI Agent View
                </button>
                <button class="nav-item" data-tab="skills">
                    <span class="icon">📜</span> Skills
                </button>
                <button class="nav-item" data-tab="rules">
                    <span class="icon">⚖️</span> Rules
                </button>
                <button class="nav-item" data-tab="tasks">
                    <span class="icon">✅</span> Tasks
                </button>
                <button class="nav-item" data-tab="git">
                    <span class="icon">🌿</span> Git
                </button>
                <button class="nav-item" data-tab="web">
                    <span class="icon">🌐</span> Web Tools
                </button>
                <button class="nav-item" data-tab="projects">
                    <span class="icon">📁</span> Projects
                </button>
                <button class="nav-item" data-tab="hierarchy">
                    <span class="icon">🌲</span> Call Hierarchy
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h2 id="current-tab-title">Dashboard</h2>

                <div class="header-center">
                    <div class="project-selector-container">
                        <label for="project-select">Active Project</label>
                        <select id="project-select" class="project-select">
                            <option value="">Loading projects...</option>
                        </select>
                    </div>
                </div>

                <div class="header-actions">
                    <div class="system-status">
                        <div class="status-indicator">
                            <span class="status-dot green"></span>
                            <span id="server-status">Server: Online</span>
                        </div>
                    </div>
                    <a href="/swagger-ui/index.html" target="_blank" class="btn-secondary btn-small">Swagger UI</a>
                    <a href="/v3/api-docs" target="_blank" class="btn-secondary btn-small">API Docs</a>
                </div>
            </header>

            <!-- Feature Containers -->
            <section id="tab-dashboard" class="tab-pane active"></section>
            <section id="tab-search" class="tab-pane"></section>
            <section id="tab-browser" class="tab-pane"></section>
            <section id="tab-web" class="tab-pane"></section>
            <section id="tab-agent" class="tab-pane"></section>
            <section id="tab-skills" class="tab-pane"></section>
            <section id="tab-rules" class="tab-pane"></section>
            <section id="tab-tasks" class="tab-pane"></section>
            <section id="tab-git" class="tab-pane"></section>
            <section id="tab-projects" class="tab-pane"></section>
            <section id="tab-hierarchy" class="tab-pane"></section>

        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
