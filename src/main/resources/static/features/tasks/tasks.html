<div class="tasks-container">
    <div class="section-header">
        <div class="header-info">
            <h3>Project Task Management</h3>
            <p>Track implementation steps and completion status for features.</p>
        </div>
        <button id="add-task-btn" class="btn-primary">
            <span>+</span> New Task
        </button>
    </div>

    <div id="tasks-list" class="tasks-grid">
        <div class="loading-placeholder">Loading project tasks...</div>
    </div>
</div>

<!-- Add Task Modal -->
<div id="task-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Create New Task</h3>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Task Title</label>
                    <input type="text" id="task-title" class="form-control" placeholder="e.g., Optimize WebCrawl Performance" required>
                </div>
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" class="form-control" rows="2" placeholder="What needs to be done?"></textarea>
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority" class="form-control">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM" selected>Medium</option>
                        <option value="HIGH">High</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Implementation Steps</label>
                    <div id="step-inputs">
                        <div class="step-input-row">
                            <input type="text" class="form-control step-input" placeholder="Step 1 description" required>
                        </div>
                    </div>
                    <button type="button" id="add-step-input-btn" class="btn-secondary btn-small" style="margin-top: 8px;">
                        + Add Step
                    </button>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal-btn">Cancel</button>
                    <button type="submit" class="btn-primary">Create Task</button>
                </div>
            </form>
        </div>
    </div>
</div>
