<div id="search-layout" class="split-layout has-viewer">
    <div class="pane-results">
        <div class="search-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search content, files, or symbols...">
                <button id="btn-search" class="btn-primary">Search</button>
            </div>
            <div class="search-filters">
                <label><input type="radio" name="search-type" value="content" checked> Content</label>
                <label><input type="radio" name="search-type" value="files"> Files</label>
                <label><input type="radio" name="search-type" value="symbols"> Symbols</label>
            </div>
        </div>
        <div id="search-results" class="results-container">
            <div class="empty-msg">Enter a query to begin searching</div>
        </div>
    </div>

    <div id="search-viewer-pane" class="file-viewer-container">
        <div class="viewer-header">
            <span id="search-viewer-filename">File View</span>
            <button class="btn-icon close-inline-viewer" data-viewer="search">✖</button>
        </div>
        <div class="viewer-content">
            <div id="search-viewer-code" class="code-editor-area">
                <pre><code class="language-java"></code></pre>
            </div>
            <div class="viewer-sidebar">
                <h5>Symbols</h5>
                <ul id="search-viewer-symbols" class="symbol-list"></ul>
            </div>
        </div>
    </div>
</div>
