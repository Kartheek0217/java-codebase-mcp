<div class="skills-container">
    <div class="skills-header">
        <div class="skill-learn-form">
            <input type="text" id="skill-url-input" placeholder="Enter .md URL (e.g. GitHub raw link)">
            <button id="btn-learn-skill" class="btn-primary">Learn Skill</button>
            <button id="btn-clear-skills" class="btn-secondary btn-danger">Clear All</button>
        </div>
        <p class="hint">Skills are also automatically learned from <code>SKILL.md</code> files in your
            project.</p>
    </div>
    <div id="skills-list" class="skills-grid">
        <div class="empty-msg">No skills learned yet for this project.</div>
    </div>
</div>
