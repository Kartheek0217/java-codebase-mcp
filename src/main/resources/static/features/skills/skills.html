<div class="skills-container">
    <div class="skills-header">
        <div class="skill-learn-form">
            <input type="text" id="skill-url-input" placeholder="Enter .md URL (e.g. GitHub raw link)">
            <button id="btn-learn-skill" class="btn-primary">Learn Skill</button>
            <button id="btn-clear-skills" class="btn-secondary btn-danger">Clear All</button>
        </div>
        <p class="hint">Skills are also automatically learned from <code>SKILL.md</code> files in your
            project.</p>
    </div>
    <div id="skills-list" class="skills-grid">
        <div class="empty-msg">No skills learned yet for this project.</div>
    </div>
</div>

<!-- Skill Detail Modal -->
<div id="modal-skill-detail" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3 id="skill-detail-title">Skill Title</h3>
            <button class="btn-icon"
                onclick="document.getElementById('modal-skill-detail').classList.remove('active')">✖</button>
        </div>
        <div class="modal-body" style="padding: 24px;">
            <div id="skill-detail-content" class="markdown-body">
                <!-- Content will be rendered here -->
            </div>
        </div>
        <div class="modal-footer"
            style="padding: 16px 32px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end;">
            <button class="btn-secondary"
                onclick="document.getElementById('modal-skill-detail').classList.remove('active')">Close</button>
        </div>
    </div>
</div>
