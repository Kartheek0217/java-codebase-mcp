<div class="rules-container">
    <div class="section-header">
        <div class="header-info">
            <h3>Project Constraints & Rules</h3>
            <p>Define project-specific standards, versions, and constraints.</p>
        </div>
        <button id="add-rule-btn" class="btn-primary">
            <span>+</span> Add Rule
        </button>
    </div>

    <div id="rules-list" class="rules-grid">
        <div class="loading-placeholder">Loading project rules...</div>
    </div>
</div>

<!-- Add/Edit Rule Modal -->
<div id="rule-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="rule-modal-title">Add New Rule</h3>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <form id="rule-form">
                <input type="hidden" id="rule-id">
                <div class="form-group">
                    <label for="rule-name">Rule Name</label>
                    <input type="text" id="rule-name" class="form-control" placeholder="e.g., JDK Version" required>
                </div>
                <div class="form-group">
                    <label for="rule-value">Value</label>
                    <input type="text" id="rule-value" class="form-control" placeholder="e.g., 21" required>
                </div>
                <div class="form-group">
                    <label for="rule-category">Category</label>
                    <select id="rule-category" class="form-control">
                        <option value="java_version">Java Version</option>
                        <option value="framework">Framework</option>
                        <option value="coding_standard">Coding Standard</option>
                        <option value="architecture">Architecture</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rule-description">Description</label>
                    <textarea id="rule-description" class="form-control" rows="3" placeholder="Explain the importance of this rule..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal-btn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Rule</button>
                </div>
            </form>
        </div>
    </div>
</div>
