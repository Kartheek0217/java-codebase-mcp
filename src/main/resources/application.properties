# --- Server Configuration ---
server.port=9696
#server.port=9898

spring.application.name=java-codebase-mcp
spring.threads.virtual.enabled=true
# Configure virtual thread-aware task execution
spring.task.execution.pool.allow-core-thread-timeout=true
spring.task.execution.pool.keep-alive=60s

# --- Database Configuration ---
spring.datasource.url=jdbc:h2:file:./data/mcpdb;DB_CLOSE_DELAY=-1;CACHE_SIZE=131072
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# --- Swagger/OpenAPI Configuration ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JMX and Health ---
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

# --- Lucene Configuration ---
lucene.ram.buffer-size=128

# --- Response Compression ---
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain

# --- Headless Browser Configuration ---
mcp.browser.headless=false
mcp.browser.browser-type=chromium
mcp.browser.timeout-ms=30000
mcp.browser.viewport-width=1280
mcp.browser.viewport-height=720
mcp.browser.screenshot-dir=data/screenshots
mcp.browser.max-sessions=10

# --- Cache Configuration ---
mcp.cache.topology-max-size=1000
mcp.cache.topology-expire-minutes=30
mcp.cache.symbol-cache-max-size=50000
mcp.cache.symbol-cache-expire-minutes=60

# --- Codebase Configuration ---
mcp.codebase.max-file-size-kb=200

# --- OpenAI-Compatible AGENT / OpenAdapter Configuration ---
# Base URL of the OpenAI-compatible API (OpenAdapter: https://api.openadapter.in/v1)
mcp.agent.base-url=https://api.openadapter.in/v1
# API key sent as Bearer token
mcp.agent.api-key=sk-cv-79e0f65d585b4e68b4b1d4452c0ab46d
# Default model name
mcp.agent.default-model=GLM-5.2
# Task-specific models
mcp.agent.model-code-review=Qwen3-Coder
mcp.agent.model-code-analysis=MiniMax-M3
mcp.agent.model-code-refactor=Kimi-K2.6
mcp.agent.model-web-search=DeepSeek-V4-Pro
mcp.agent.model-junit-test=GLM-5-Turbo
mcp.agent.model-java-doc=qwen3.7-plus
mcp.agent.model-code-commit=DeepSeek-V4-Flash
# HTTP timeout in seconds for generation requests
mcp.agent.timeout-seconds=120
# Maximum tokens the model may generate per response
mcp.agent.max-tokens=4096

# --- Spring Response Envelope Configuration ---
response-envelope.enabled=true
response-envelope.default-config.include-timestamp=true
response-envelope.default-config.include-request-id=true
response-envelope.default-config.include-path=true
response-envelope.default-config.include-method=true
response-envelope.default-config.include-duration=true
response-envelope.default-config.include-api-version=false
response-envelope.default-config.timestamp-format=ISO_8601
response-envelope.default-config.request-id-header=X-Request-ID
response-envelope.default-config.propagate-request-id=true
response-envelope.default-config.include-nulls=false
response-envelope.default-config.data-key=data
response-envelope.default-config.timezone=UTC
response-envelope.error-config.include-stacktrace=false
response-envelope.error-config.include-exception-class=true
response-envelope.error-config.show-detailed-messages=true
response-envelope.error-config.include-field-errors=true
response-envelope.error-config.error-source=java-codebase-mcp
response-envelope.metrics.enabled=false
response-envelope.cache.enabled=false
response-envelope.compression.enabled=false
