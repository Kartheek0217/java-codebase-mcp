spring.application.name=${SPRING_APPLICATION_NAME:java-codebase-mcp}
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}

# --- Database Configuration ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/mcpdb;DB_CLOSE_DELAY=-1;CACHE_SIZE=131072}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- Server Configuration ---
server.port=${SERVER_PORT:9696}
#server.port=9898

# --- Swagger/OpenAPI Configuration ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JMX and Health ---
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

# --- Lucene Configuration ---
lucene.ram.buffer-size=${LUCENE_RAM_BUFFER_SIZE:128.0}

# --- Response Compression ---
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain

# --- Web Crawler Configuration ---
mcp.web.crawler.max-pages=${CRAWLER_MAX_PAGES:10}
mcp.web.crawler.max-concurrent=${CRAWLER_MAX_CONCURRENT:4}
mcp.web.crawler.delay-ms=${CRAWLER_DELAY_MS:1000}
mcp.web.crawler.connect-timeout-ms=${CRAWLER_TIMEOUT_MS:30000}
mcp.web.crawler.user-agent=${CRAWLER_USER_AGENT:JavaCodebaseMCP/1.0}

# --- Headless Browser Configuration ---
mcp.browser.headless=${BROWSER_HEADLESS:true}
mcp.browser.browser-type=${BROWSER_TYPE:chromium}
mcp.browser.viewport-width=${BROWSER_VIEWPORT_WIDTH:1280}
mcp.browser.viewport-height=${BROWSER_VIEWPORT_HEIGHT:720}
mcp.browser.timeout-ms=${BROWSER_TIMEOUT_MS:30000}
mcp.browser.max-sessions=${BROWSER_MAX_SESSIONS:10}
