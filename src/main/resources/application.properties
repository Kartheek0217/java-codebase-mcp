spring.application.name=java-codebase-mcp
spring.threads.virtual.enabled=true

# --- Database Configuration ---
spring.datasource.url=jdbc:h2:file:./data/mcpdb;DB_CLOSE_DELAY=-1;CACHE_SIZE=131072
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- Server Configuration ---
server.port=9696
#server.port=9898

# --- Swagger/OpenAPI Configuration ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JMX and Health ---
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

# --- Lucene Configuration ---
lucene.ram.buffer-size=128.0

# --- Response Compression ---
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain

# --- Headless Browser Configuration ---
mcp.browser.headless=true
mcp.browser.browser-type=chromium
mcp.browser.viewport-width=1280
mcp.browser.viewport-height=720
mcp.browser.timeout-ms=120000
mcp.browser.max-sessions=10
