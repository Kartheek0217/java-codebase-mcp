spring.application.name=java-codebase-mcp
spring.threads.virtual.enabled=true
spring.datasource.url=jdbc:h2:file:./data/mcpdb;DB_CLOSE_DELAY=-1;CACHE_SIZE=131072
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

server.port=8080


# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JMX and Health
management.endpoint.health.show-details=always

# OpenAdapter API Configuration
openadapter.api.key=sk-cv-7abde8a4d89c499c84ca594c1c729d40
openadapter.api.base-url=https://api.openadapter.in/v1/tools

