spring.application.name=java-codebase-mcp
spring.threads.virtual.enabled=true
# Configure virtual thread-aware task execution
spring.task.execution.pool.allow-core-thread-timeout=true
spring.task.execution.pool.keep-alive=60s

# --- Database Configuration ---
spring.datasource.url=jdbc:h2:file:./data/mcpdb;DB_CLOSE_DELAY=-1;CACHE_SIZE=131072
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# --- Server Configuration ---
# server.port=9696
server.port=9898

# --- Swagger/OpenAPI Configuration ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JMX and Health ---
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

# --- Lucene Configuration ---
lucene.ram.buffer-size=128.0

# --- Response Compression ---
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain

# --- Headless Browser Configuration ---
mcp.browser.headless=false
mcp.browser.browser-type=chromium
mcp.browser.timeout-ms=30000
mcp.browser.viewport-width=1280
mcp.browser.viewport-height=720
mcp.browser.screenshot-dir=data/screenshots
mcp.browser.max-sessions=10

# --- Cache Configuration ---
mcp.cache.topology-max-size=1000
mcp.cache.topology-expire-minutes=30
mcp.cache.symbol-cache-max-size=50000
mcp.cache.symbol-cache-expire-minutes=60

# --- Codebase Configuration ---
mcp.codebase.max-file-size-kb=200

# --- OpenAI-Compatible LLM / OpenAdapter Configuration ---
# Base URL of the OpenAI-compatible API (OpenAdapter: https://api.openadapter.in/v1)
mcp.llm.base-url=https://api.openadapter.in/v1
# API key sent as Bearer token
mcp.llm.api-key=sk-cv-79e0f65d585b4e68b4b1d4452c0ab46d
# Default model name
mcp.llm.default-model=0G-GLM-5.2
# Task-specific models
mcp.llm.model-code-review=Qwen3-Coder
mcp.llm.model-code-analysis=Kimi-K2.5
mcp.llm.model-code-refactor=0g-minimax-m3
mcp.llm.model-web-search=gemma-4-31b-it
mcp.llm.model-junit-test=GLM-5
mcp.llm.model-java-doc=0G-Qwen3.7-max
mcp.llm.model-code-commit=0G-DeepSeek-v4-Pro
# HTTP timeout in seconds for generation requests
mcp.llm.timeout-seconds=120
# Maximum tokens the model may generate per response
mcp.llm.max-tokens=2048
