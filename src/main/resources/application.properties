spring.application.name=${SPRING_APPLICATION_NAME:java-codebase-mcp}
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}

# --- Database Configuration ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/mcpdb;DB_CLOSE_DELAY=-1;CACHE_SIZE=131072}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- SQL Initialization ---
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# --- Server Configuration ---
server.port=${SERVER_PORT:9696}

# --- Swagger/OpenAPI Configuration ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JMX and Health ---
management.endpoint.health.show-details=always

# --- OpenAdapter API Configuration ---
openadapter.api.key=${OPENADAPTER_API_KEY:sk-cv-7abde8a4d89c499c84ca594c1c729d40}
openadapter.api.base-url=${OPENADAPTER_API_BASE_URL:https://api.openadapter.in/v1/tools}

# --- Lucene Configuration ---
lucene.ram.buffer-size=${LUCENE_RAM_BUFFER_SIZE:128.0}
