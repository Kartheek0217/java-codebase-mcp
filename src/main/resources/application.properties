spring.application.name=java-codebase-mcp
spring.threads.virtual.enabled=true

# --- Database Configuration ---
spring.datasource.url=jdbc:h2:file:./data/mcpdb;DB_CLOSE_DELAY=-1;CACHE_SIZE=131072
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Indexing Configuration
mcp.indexing.concurrency=50
mcp.indexing.worker-concurrency=50

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- Server Configuration ---
server.port=9696
#server.port=9898

# --- Swagger/OpenAPI Configuration ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JMX and Health ---
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

# --- Lucene Configuration ---
lucene.ram.buffer-size=128.0

# --- Response Compression ---
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain

# --- Headless Browser Configuration ---
mcp.browser.headless=false
mcp.browser.browser-type=chromium
mcp.browser.timeout-ms=30000
mcp.browser.viewport-width=1280
mcp.browser.viewport-height=720
mcp.browser.screenshot-dir=data/screenshots
mcp.browser.max-sessions=10

# --- Cache Configuration ---
mcp.cache.topology-max-size=1000
mcp.cache.topology-expire-minutes=30
mcp.cache.symbol-cache-max-size=50000
mcp.cache.symbol-cache-expire-minutes=60
